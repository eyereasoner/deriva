<svg xmlns="http://www.w3.org/2000/svg" width="900" height="380" viewBox="0 0 900 380" role="img" aria-labelledby="title desc">
  <title id="title">Aggregation at a produce market</title>
  <desc id="desc">Baskets with measured weights pass over a market counter into count, sum, minimum, and maximum result cards.</desc>
  <style>
    .wall{fill:#eee5d3}.counter{fill:#a97852}.basket{fill:#c89062;stroke:#76553c;stroke-width:3}.fruit{stroke:#2f6f55;stroke-width:2}
    .card{fill:#fffdf7;stroke:#243447;stroke-width:2}.text{fill:#243447;font:15px ui-monospace,monospace}
    .flow{fill:none;stroke:#8b3a3a;stroke-width:3}.result{fill:#dcefe8;stroke:#2f6f55;stroke-width:3}
  </style>
  <rect width="900" height="380" class="wall"/><rect y="235" width="900" height="145" class="counter"/>
  <g transform="translate(65 120)"><path class="basket" d="M0 40 H140 L120 130 H20Z"/><path d="M30 40 Q70-35 110 40" fill="none" stroke="#76553c" stroke-width="5"/><circle class="fruit" cx="48" cy="55" r="25" fill="#a55246"/><circle class="fruit" cx="91" cy="57" r="27" fill="#d9b85f"/><rect class="card" x="38" y="93" width="65" height="30"/><text class="text" x="70" y="114" text-anchor="middle">2 kg</text></g>
  <g transform="translate(245 130) scale(.85)"><path class="basket" d="M0 40 H140 L120 130 H20Z"/><path d="M30 40 Q70-35 110 40" fill="none" stroke="#76553c" stroke-width="5"/><circle class="fruit" cx="48" cy="55" r="25" fill="#a55246"/><circle class="fruit" cx="91" cy="57" r="27" fill="#d9b85f"/><rect class="card" x="38" y="93" width="65" height="30"/><text class="text" x="70" y="114" text-anchor="middle">5 kg</text></g>
  <g transform="translate(395 135) scale(.78)"><path class="basket" d="M0 40 H140 L120 130 H20Z"/><path d="M30 40 Q70-35 110 40" fill="none" stroke="#76553c" stroke-width="5"/><circle class="fruit" cx="48" cy="55" r="25" fill="#a55246"/><circle class="fruit" cx="91" cy="57" r="27" fill="#d9b85f"/><rect class="card" x="38" y="93" width="65" height="30"/><text class="text" x="70" y="114" text-anchor="middle">3 kg</text></g>
  <path class="flow" d="M520 190 C575 190 575 95 630 95 M520 190 C575 190 575 165 630 165 M520 190 C575 190 575 235 630 235 M520 190 C575 190 575 305 630 305"/>
  <rect class="result" x="630" y="67" width="210" height="55" rx="8"/><text class="text" x="735" y="100" text-anchor="middle">count = 3</text>
  <rect class="result" x="630" y="137" width="210" height="55" rx="8"/><text class="text" x="735" y="170" text-anchor="middle">sum = 10 kg</text>
  <rect class="result" x="630" y="207" width="210" height="55" rx="8"/><text class="text" x="735" y="240" text-anchor="middle">min = 2 kg</text>
  <rect class="result" x="630" y="277" width="210" height="55" rx="8"/><text class="text" x="735" y="310" text-anchor="middle">max = 5 kg</text>
</svg>
