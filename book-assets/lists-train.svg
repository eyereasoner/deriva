<svg xmlns="http://www.w3.org/2000/svg" width="900" height="340" viewBox="0 0 900 340" role="img" aria-labelledby="title desc">
  <title id="title">Lists as railway carriages</title>
  <desc id="desc">A train of labeled carriages shows a list head, its tail, and two shorter trains joining through append.</desc>
  <style>
    .sky{fill:#e9f1ee}.ground{fill:#eee5d3}.rail{stroke:#536b78;stroke-width:5}.tie{stroke:#76553c;stroke-width:3}
    .car{fill:#fffdf7;stroke:#243447;stroke-width:3}.head{fill:#dcefe8;stroke:#2f6f55;stroke-width:4}
    .wheel{fill:#536b78;stroke:#243447;stroke-width:2}.text{fill:#243447;font:18px ui-monospace,monospace}.brace{fill:none;stroke:#8b3a3a;stroke-width:3}
  </style>
  <rect width="900" height="340" class="sky"/><rect y="230" width="900" height="110" class="ground"/>
  <line class="rail" x1="40" y1="275" x2="860" y2="275"/><g class="tie"><line x1="70" y1="260" x2="70" y2="290"/><line x1="150" y1="260" x2="150" y2="290"/><line x1="230" y1="260" x2="230" y2="290"/><line x1="310" y1="260" x2="310" y2="290"/><line x1="390" y1="260" x2="390" y2="290"/><line x1="470" y1="260" x2="470" y2="290"/><line x1="550" y1="260" x2="550" y2="290"/><line x1="630" y1="260" x2="630" y2="290"/><line x1="710" y1="260" x2="710" y2="290"/><line x1="790" y1="260" x2="790" y2="290"/></g>
  <g transform="translate(70 135)"><rect class="head" width="160" height="95" rx="8"/><text class="text" x="80" y="55" text-anchor="middle">red</text><circle class="wheel" cx="40" cy="105" r="14"/><circle class="wheel" cx="120" cy="105" r="14"/></g>
  <g transform="translate(255 135)"><rect class="car" width="160" height="95" rx="8"/><text class="text" x="80" y="55" text-anchor="middle">green</text><circle class="wheel" cx="40" cy="105" r="14"/><circle class="wheel" cx="120" cy="105" r="14"/></g>
  <g transform="translate(440 135)"><rect class="car" width="160" height="95" rx="8"/><text class="text" x="80" y="55" text-anchor="middle">blue</text><circle class="wheel" cx="40" cy="105" r="14"/><circle class="wheel" cx="120" cy="105" r="14"/></g>
  <path class="brace" d="M70 112 Q150 78 230 112"/><text class="text" x="150" y="73" text-anchor="middle">Head</text>
  <path class="brace" d="M255 112 Q425 45 600 112"/><text class="text" x="425" y="38" text-anchor="middle">Tail</text>
  <path d="M230 185 H255 M415 185 H440" stroke="#243447" stroke-width="5"/><text class="text" x="685" y="170">[Head | Tail]</text><text class="text" x="685" y="205">append joins trains</text>
</svg>
