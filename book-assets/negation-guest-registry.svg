<svg xmlns="http://www.w3.org/2000/svg" width="900" height="380" viewBox="0 0 900 380" role="img" aria-labelledby="title desc">
  <title id="title">Negation and a complete guest registry</title>
  <desc id="desc">A receptionist checks a complete event registry; one invited name is absent from the blocked list, making closed-world negation meaningful.</desc>
  <style>
    .wall{fill:#e9f1ee}.desk{fill:#a97852}.book{fill:#fffdf7;stroke:#243447;stroke-width:3}.line{stroke:#536b78;stroke-width:2}
    .person{fill:#fffdf7;stroke:#243447;stroke-width:2}.coat{fill:#d7e9e2;stroke:#243447;stroke-width:2}
    .text{fill:#243447;font:15px ui-monospace,monospace}.red{fill:#8b3a3a}.green{fill:#2f6f55}.stamp{fill:none;stroke:#2f6f55;stroke-width:4}
  </style>
  <rect width="900" height="380" class="wall"/><rect y="285" width="900" height="95" class="desk"/>
  <g transform="translate(105 210)"><circle class="person" cx="0" cy="-55" r="24"/><path class="coat" d="M-38-25 Q0-50 38-25 L30 65 H-30Z"/></g>
  <rect class="book" x="245" y="55" width="545" height="260" rx="8"/><line class="line" x1="515" y1="55" x2="515" y2="315"/>
  <text class="text" x="380" y="90" text-anchor="middle">COMPLETE GUEST LIST</text><text class="text" x="650" y="90" text-anchor="middle">BLOCKED</text>
  <text class="text" x="285" y="135">ada</text><circle class="green" cx="470" cy="130" r="8"/><text class="text" x="285" y="180">byron</text><circle class="green" cx="470" cy="175" r="8"/><text class="text" x="285" y="225">clara</text><circle class="green" cx="470" cy="220" r="8"/>
  <text class="text" x="555" y="135">byron</text><circle class="red" cx="750" cy="130" r="8"/>
  <circle class="stamp" cx="650" cy="220" r="48"/><path class="stamp" d="M620 220 L641 241 L682 195"/><text class="text" x="650" y="290" text-anchor="middle">not(blocked(clara))</text>
  <path d="M150 165 C195 130 225 125 270 130" fill="none" stroke="#8b3a3a" stroke-width="3"/>
</svg>
