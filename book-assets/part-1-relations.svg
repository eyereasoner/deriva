<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360" role="img" aria-labelledby="title desc">
  <title id="title">Relations</title>
  <desc id="desc">Two constellations of terms are joined by repeating arcs, suggesting facts, shared variables, and relational structure.</desc>
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0" stop-color="#fffdf7"/>
      <stop offset="1" stop-color="#eee5d3"/>
    </radialGradient>
    <style>
      .thread{fill:none;stroke:#536b78;stroke-width:2.2;opacity:.72}
      .echo{fill:none;stroke:#9a5b18;stroke-width:2;stroke-dasharray:5 8;opacity:.8}
      .term{fill:#fffdf7;stroke:#243447;stroke-width:2.5}
      .shared{fill:#dcefe8;stroke:#2f6f55;stroke-width:3}
      .spark{fill:#8b3a3a}
    </style>
  </defs>
  <rect width="900" height="360" fill="url(#glow)"/>
  <path class="thread" d="M90 235 C180 30 310 35 410 180 S650 335 810 105"/>
  <path class="thread" d="M90 105 C230 335 350 315 450 180 S680 25 810 235"/>
  <path class="echo" d="M90 235 C265 245 280 85 450 180 S650 275 810 105"/>
  <path class="echo" d="M90 105 C250 95 300 270 450 180 S650 80 810 235"/>
  <circle class="term" cx="90" cy="105" r="28"/>
  <circle class="term" cx="90" cy="235" r="28"/>
  <circle class="term" cx="280" cy="75" r="20"/>
  <circle class="term" cx="280" cy="285" r="20"/>
  <circle class="shared" cx="450" cy="180" r="42"/>
  <circle class="term" cx="620" cy="75" r="20"/>
  <circle class="term" cx="620" cy="285" r="20"/>
  <circle class="term" cx="810" cy="105" r="28"/>
  <circle class="term" cx="810" cy="235" r="28"/>
  <circle class="spark" cx="450" cy="180" r="8"/>
  <circle class="spark" cx="90" cy="105" r="5"/>
  <circle class="spark" cx="810" cy="235" r="5"/>
</svg>
