<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">Relations in an ordinary town</title>
  <desc id="desc">People, homes, a school, and a bicycle are connected by labeled facts in a small town scene.</desc>
  <style>
    .sky{fill:#e9f1ee}.ground{fill:#eee5d3}.road{fill:#c9c1b2}
    .building{fill:#fffdf7;stroke:#243447;stroke-width:2}.roof{fill:#a55246;stroke:#243447;stroke-width:2}
    .tree{fill:#6c927d;stroke:#2f6f55;stroke-width:2}.trunk{stroke:#76553c;stroke-width:8}
    .person{fill:#fffdf7;stroke:#243447;stroke-width:2}.shirt{fill:#d7e9e2;stroke:#243447;stroke-width:2}
    .relation{fill:none;stroke:#8b3a3a;stroke-width:2.5;stroke-dasharray:7 5}
    .label{fill:#fffdf7;stroke:#8b3a3a;stroke-width:1.5}.text{fill:#713535;font:14px ui-monospace,monospace}
    .detail{fill:none;stroke:#243447;stroke-width:3;stroke-linecap:round}
  </style>
  <rect width="900" height="265" class="sky"/><rect y="265" width="900" height="155" class="ground"/>
  <path class="road" d="M0 355 C220 305 390 385 565 335 S770 300 900 325 L900 420 L0 420Z"/>
  <rect class="building" x="65" y="155" width="190" height="140"/><polygon class="roof" points="45,160 160,75 275,160"/>
  <rect x="93" y="202" width="45" height="93" fill="#c89062" stroke="#243447" stroke-width="2"/>
  <rect x="178" y="195" width="47" height="48" fill="#bcd6df" stroke="#243447" stroke-width="2"/>
  <rect class="building" x="650" y="120" width="180" height="155"/><polygon class="roof" points="625,125 740,48 855,125"/>
  <rect x="716" y="194" width="50" height="81" fill="#c89062" stroke="#243447" stroke-width="2"/>
  <text x="740" y="163" text-anchor="middle" fill="#243447" font-family="Georgia,serif" font-size="18">SCHOOL</text>
  <line class="trunk" x1="570" y1="165" x2="570" y2="282"/><circle class="tree" cx="570" cy="125" r="55"/>
  <g transform="translate(340 230)"><circle class="person" cx="0" cy="-42" r="19"/><path class="shirt" d="M-30 -15 Q0-35 30-15 L24 48 H-24Z"/><path class="detail" d="M-12 48 L-15 85 M12 48 L16 85"/></g>
  <g transform="translate(455 245) scale(.82)"><circle class="person" cx="0" cy="-42" r="19"/><path class="shirt" d="M-30 -15 Q0-35 30-15 L24 48 H-24Z"/><path class="detail" d="M-12 48 L-15 85 M12 48 L16 85"/></g>
  <g transform="translate(790 293)"><circle cx="-25" cy="24" r="22" fill="none" stroke="#243447" stroke-width="3"/><circle cx="35" cy="24" r="22" fill="none" stroke="#243447" stroke-width="3"/><path class="detail" d="M-25 24 L0-10 L35 24 L-5 24 L15-30 M0-10 L20-10"/></g>
  <path class="relation" d="M340 170 C310 120 245 110 205 145"/><rect class="label" x="240" y="99" width="74" height="25" rx="12"/><text class="text" x="277" y="117" text-anchor="middle">lives_at</text>
  <path class="relation" d="M363 205 C400 175 425 180 444 214"/><rect class="label" x="365" y="167" width="78" height="25" rx="12"/><text class="text" x="404" y="185" text-anchor="middle">parent_of</text>
  <path class="relation" d="M475 212 C515 145 625 175 670 205"/><rect class="label" x="535" y="156" width="70" height="25" rx="12"/><text class="text" x="570" y="174" text-anchor="middle">attends</text>
  <path class="relation" d="M360 300 C470 360 665 370 763 319"/><rect class="label" x="530" y="348" width="60" height="25" rx="12"/><text class="text" x="560" y="366" text-anchor="middle">owns</text>
